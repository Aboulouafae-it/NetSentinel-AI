      <feColorMatrix type="matrix" values="1 0 0 0 0.95 0 1 0 0 0.02 0 0 1 0 0.07 0 0 0 0.62 0"/>
      <feBlend mode="screen" in2="BackgroundImageFix" result="effect"/>
      <feBlend mode="normal" in="SourceGraphic" in2="effect" result="shape"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#07090F"/>

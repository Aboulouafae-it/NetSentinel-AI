<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NetSentinel AI logo</title>
  <desc id="desc">A red sentinel eye with three inner nodes and a sharp white brow.</desc>
  <defs>
    <radialGradient id="irisGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 272) rotate(90) scale(118 178)">
      <stop offset="0" stop-color="#FFB3B3"/>
      <stop offset="0.24" stop-color="#FF3434"/>
      <stop offset="0.62" stop-color="#C90018"/>
      <stop offset="1" stop-color="#5B000A"/>
    </radialGradient>
    <linearGradient id="eyeEdge" x1="92" y1="238" x2="420" y2="238" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF1E2D"/>
      <stop offset="0.5" stop-color="#FF5961"/>
      <stop offset="1" stop-color="#A60014"/>
    </linearGradient>
    <linearGradient id="brow" x1="116" y1="146" x2="404" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.5" stop-color="#DCE7F7"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="redGlow" x="26" y="125" width="460" height="309" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>

  <path d="M128 264C159 224 202 204 256 204C310 204 353 224 384 264C353 304 310 324 256 324C202 324 159 304 128 264Z" fill="#09070A"/>
  <ellipse cx="256" cy="264" rx="86" ry="70" fill="url(#irisGlow)"/>

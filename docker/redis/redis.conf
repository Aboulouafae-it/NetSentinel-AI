# NetSentinel AI — Redis Configuration

# Bind to all interfaces for Docker
bind 0.0.0.0

# Disable protected mode when running inside isolated Docker network
protected-mode no

# Memory limits
maxmemory 256mb
maxmemory-policy allkeys-lru

# Save snapshots periodically (RDB)
save 900 1
save 300 10
save 60 10000

# Directory for persistence
dir /data

# Append Only File (AOF) - disabled for MVP to save disk I/O, 
# relying on RDB snapshots is sufficient for cache/queue.
appendonly no

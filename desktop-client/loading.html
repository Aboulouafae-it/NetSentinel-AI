<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NetSentinel AI</title>
    <style>
      :root {
        color-scheme: dark;
        background: #07090f;
        color: #f8fafc;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #07090f;
      }

      .panel {
        max-width: 440px;
        padding: 32px;
        text-align: center;
      }

      img {
        width: 96px;
        height: 96px;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 26px;
      }

      p {
        margin: 0;
        color: #94a3b8;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <img src="./icon.png" alt="" />
      <h1>NetSentinel AI</h1>
      <p>Starting the local platform...</p>
    </main>
  </body>
</html>
